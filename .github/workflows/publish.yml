# 自动发布 x-proto-ui 到 npm
#
# 触发：推送 v*.*.* 标签（如 v0.1.1），或在 Actions 页手动运行。
# 前置：在仓库 Settings → Secrets and variables → Actions 添加 secret
#       NPM_TOKEN = 一个 npm「Automation」或「Granular（含 publish 权限）」令牌
#       （Automation 令牌可绕过 2FA OTP，专为 CI 设计）。
#
# 假设：本仓库根目录 = x-ui 包（package.json 在根）。
#   若 x-ui 是 monorepo 的子目录，见下方两处「# monorepo:」注释。

name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: {}   # 允许手动触发

permissions:
  contents: read
  id-token: write          # npm provenance（供应链溯源）所需

jobs:
  publish:
    runs-on: ubuntu-latest
    # monorepo: 取消下面 3 行注释，把路径改成 x-ui 子目录
    # defaults:
    #   run:
    #     working-directory: pm-prototype-ui-library/x-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          # monorepo: 取消下一行注释,指向子目录的 lockfile
          # cache-dependency-path: pm-prototype-ui-library/x-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json = $PKG_VERSION ; tag = $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::标签 v$TAG_VERSION 与 package.json 版本 $PKG_VERSION 不一致,已中止。"
            exit 1
          fi

      - name: Publish to npm
        # --provenance 需要 public 仓库 + 上面的 id-token: write；
        # 私有仓库请删掉 --provenance。
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
