<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-brand="neutral">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>x-ui 示例 · 仪表盘</title>
  <link rel="stylesheet" href="../dist/x-ui.css">
  <script src="../dist/x-ui.js" defer></script>
  <style>
    .ptop { position: fixed; inset: 0 0 auto 0; height: 56px; z-index: 50; display: flex; align-items: center; gap: 18px; padding: 0 22px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
    .ptop .logo { width: 22px; height: 22px; border: 1.5px solid var(--accent); border-radius: 6px; }
    .ptop .x-menu--horizontal { border: none; gap: 20px; }
    .ptop .x-menu__item { padding: 18px 2px; text-decoration: none; }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 84px 24px 60px; }
    .bars { display: flex; align-items: flex-end; gap: 10px; height: 140px; }
    .bars > div { flex: 1; background: var(--bg-fill); border-radius: 5px 5px 0 0; }
    .act { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
    .act .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  </style>
</head>
<body>
  <div class="ptop">
    <div class="logo"></div><strong style="color:var(--accent)">x-ui</strong>
    <nav class="x-menu--horizontal x-menu">
      <a class="x-menu__item" href="list.html"><span>列表页</span></a>
      <a class="x-menu__item" href="form.html"><span>表单页</span></a>
      <a class="x-menu__item" href="detail.html"><span>详情页</span></a>
      <a class="x-menu__item is-active" href="dashboard.html"><span>仪表盘</span></a>
    </nav>
    <div style="flex:1"></div>
    <button class="x-btn x-btn--secondary x-btn--sm" onclick="xui.toggleTheme()">切换底纹</button>
  </div>

  <div class="wrap">
    <div style="font-size:20px;font-weight:600;margin-bottom:18px">概览仪表盘</div>

    <div class="x-grid x-grid--4" style="margin-bottom:16px">
      <div class="x-card"><div class="x-card__body" style="padding:18px"><div class="x-stat__label">运行任务</div><div class="x-stat__value x-stat__value--md">86</div></div></div>
      <div class="x-card"><div class="x-card__body" style="padding:18px"><div class="x-stat__label">今日同步</div><div class="x-stat__row"><span class="x-stat__value x-stat__value--md">1.2M</span><span class="x-stat__delta x-stat__delta--up">+8%</span></div></div></div>
      <div class="x-card"><div class="x-card__body" style="padding:18px"><div class="x-stat__label">告警</div><div class="x-stat__row"><span class="x-stat__value x-stat__value--md">3</span><span class="x-stat__delta x-stat__delta--warning">待处理</span></div></div></div>
      <div class="x-card"><div class="x-card__body" style="padding:18px"><div class="x-stat__label">错误率</div><div class="x-stat__row"><span class="x-stat__value x-stat__value--md">0.4%</span><span class="x-stat__delta x-stat__delta--down">+0.1%</span></div></div></div>
    </div>

    <div style="display:grid;grid-template-columns:1.6fr 1fr;gap:16px">
      <div class="x-card"><div class="x-card__body" style="padding:20px">
        <div class="x-card__title" style="margin-bottom:18px">同步量趋势</div>
        <div class="bars">
          <div style="height:46%"></div><div style="height:62%"></div><div style="height:54%"></div><div style="height:78%"></div>
          <div style="height:68%;background:var(--brand)"></div><div style="height:90%;background:var(--brand)"></div><div style="height:72%"></div>
        </div>
      </div></div>
      <div class="x-card"><div class="x-card__body" style="padding:20px">
        <div class="x-card__title" style="margin-bottom:14px">最近活动</div>
        <div class="act"><span class="dot" style="background:var(--success)"></span><div style="flex:1"><div style="font-size:13px">用户中心同步成功</div><div class="x-timeline__time">09:12</div></div></div>
        <div class="act"><span class="dot" style="background:var(--warning)"></span><div style="flex:1"><div style="font-size:13px">支付网关延迟告警</div><div class="x-timeline__time">08:40</div></div></div>
        <div class="act"><span class="dot" style="background:var(--danger)"></span><div style="flex:1"><div style="font-size:13px">消息队列离线</div><div class="x-timeline__time">昨日 23:55</div></div></div>
      </div></div>
    </div>
  </div>
</body>
</html>
